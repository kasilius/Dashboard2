<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المختبر الذكي - مدرسة ناصر بن عبدالله العطية</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f4f8;
            --sidebar-bg: #ffffff;
            --accent-blue: #2563eb;
            --text-dark: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --sidebar-width: 320px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            overflow: hidden;
        }

        #app { display: flex; height: 100vh; width: 100vw; }

        /* --- الجانب الأيمن (Sidebar) --- */
        .sidebar-left {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .lesson-title { 
            font-family: 'Changa', sans-serif; 
            margin: 0; 
            font-size: 1.4rem; 
            color: var(--accent-blue);
        }

        .objectives-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .objective-card {
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 10px;
            padding: 15px;
            border: 1px solid #edf2f7;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        /* --- القسم القابل للطي (المدرسة) --- */
        .collapsible-footer {
            background: #f8fafc;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.3s;
        }

        .collapsible-footer:hover {
            background: #f1f5f9;
        }

        .footer-trigger {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-blue);
        }

        .footer-content {
            padding: 0 15px 20px 15px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .school-name {
            display: block;
            font-weight: bold;
            color: #1e293b;
            margin-top: 8px;
            line-height: 1.4;
        }

        .arrow-icon {
            transition: transform 0.3s;
        }
        .arrow-rotated {
            transform: rotate(180deg);
        }

        /* --- منطقة المحتوى --- */
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }

        .tabs-header {
            background: #ffffff;
            display: flex;
            padding: 12px 20px 0;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-bottom: none;
            background: #f8fafc;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Changa', sans-serif;
            border-radius: 10px 10px 0 0;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #ffffff;
            border-color: var(--accent-blue);
        }

        .content-area { flex: 1; padding: 20px; }

        iframe {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: none;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* لوحة الإدارة */
        .admin-toggle {
            position: fixed; bottom: 80px; left: 20px;
            background: var(--accent-blue);
            color: white; border: none; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
            z-index: 1000;
        }

        .admin-panel {
            position: fixed; left: 0; top: 0; width: 320px; height: 100%;
            background: white; box-shadow: 15px 0 40px rgba(0,0,0,0.1);
            padding: 25px; z-index: 1001; overflow-y: auto;
        }

        .admin-input {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid var(--border-color); border-radius: 8px;
            font-family: 'Tajawal';
        }

        .btn-add {
            width: 100%; padding: 12px; background: var(--accent-blue);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-family: 'Changa';
        }
    </style>
</head>
<body>

<div id="app">
    <!-- السايدبار -->
    <aside class="sidebar-left">
        <div class="sidebar-header">
            <h2 class="lesson-title">{{ lessonTitle }}</h2>
        </div>

        <div class="objectives-list">
            <div v-for="(obj, index) in currentTabGoals" :key="index" class="objective-card animate__animated animate__fadeInRight">
                {{ obj }}
            </div>
            <div v-if="currentTabGoals.length === 0" style="text-align: center; color: var(--text-muted); margin-top: 30px; font-size: 0.9rem;">
                📍 بانتظار إضافة أهداف الدرس
            </div>
        </div>

        <!-- القسم المنكمش والمتمدد -->
        <div class="collapsible-footer" @click="showSchoolInfo = !showSchoolInfo">
            <div class="footer-trigger">
                <span>🧪 معلومات القسم</span>
                <span class="arrow-icon" :class="{ 'arrow-rotated': showSchoolInfo }">▼</span>
            </div>
            
            <transition 
                enter-active-class="animate__animated animate__fadeIn"
                leave-active-class="animate__animated animate__fadeOut">
                <div v-if="showSchoolInfo" class="footer-content">
                    <div>قسم الكيمياء</div>
                    <span class="school-name">مدرسة ناصر بن عبدالله العطية الثانوية للبنين</span>
                </div>
            </transition>
        </div>

        <button class="admin-toggle" @click="showAdmin = true">⚙️</button>
    </aside>

    <!-- منطقة العرض -->
    <main class="main-stage">
        <nav class="tabs-header">
            <button v-for="(tab, index) in dynamicTabs" 
                    :key="index" 
                    @click="activeTabId = index" 
                    :class="['tab-btn', { active: activeTabId === index }]">
                {{ tab.label }}
            </button>
        </nav>

        <div class="content-area">
            <iframe v-if="dynamicTabs.length > 0" :src="formatUrl(dynamicTabs[activeTabId].url)" allowfullscreen></iframe>
            <div v-else style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-muted);">
                يرجى إضافة نشاط من الإعدادات ⚙️
            </div>
        </div>
    </main>

    <!-- لوحة التحكم -->
    <div v-if="showAdmin" class="admin-panel animate__animated animate__slideInLeft">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="margin:0; color:var(--accent-blue);">إعدادات المحتوى</h3>
            <button @click="showAdmin = false" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>

        <label>عنوان الدرس:</label>
        <input v-model="lessonTitle" class="admin-input">

        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

        <h4>إضافة تاب جديد:</h4>
        <input v-model="newTab.label" placeholder="اسم التاب" class="admin-input">
        <input v-model="newTab.url" placeholder="الرابط" class="admin-input">
        <textarea v-model="newTab.goals" placeholder="الأهداف (هدف في كل سطر)" class="admin-input" rows="3"></textarea>
        
        <button class="btn-add" @click="addNewTab">حفظ وإضافة 🚀</button>

        <h4 style="margin-top:25px;">التابات الحالية (للحذف):</h4>
        <div v-for="(tab, idx) in dynamicTabs" :key="idx" style="display:flex; justify-content:space-between; margin-bottom:5px; background:#fff1f1; padding:8px; border-radius:5px; font-size:0.8rem;">
            <span>{{ tab.label }}</span>
            <button @click="removeTab(idx)" style="color:red; border:none; background:none; cursor:pointer;">حذف</button>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed } = Vue;
    createApp({
        setup() {
            const lessonTitle = ref('كيمياء المحاليل');
            const activeTabId = ref(0);
            const showAdmin = ref(false);
            const showSchoolInfo = ref(false); // حالة الانكماش (مغلق افتراضياً)
            
            const dynamicTabs = ref([
                { 
                    label: 'تجربة استهلالية 🧪', 
                    url: 'https://phet.colorado.edu/sims/html/acid-base-solutions/latest/acid-base-solutions_all.html?locale=ar', 
                    goals: ['أن يقارن الطالب بين الأحماض والقواعد', 'أن يقيس درجة الحموضة pH بدقة'] 
                }
            ]);

            const newTab = ref({ label: '', url: '', goals: '' });

            const currentTabGoals = computed(() => {
                return dynamicTabs.value[activeTabId.value]?.goals || [];
            });

            const addNewTab = () => {
                if (newTab.value.label && newTab.value.url) {
                    const goalsArray = newTab.value.goals.split('\n').filter(g => g.trim() !== '');
                    dynamicTabs.value.push({
                        label: newTab.value.label,
                        url: newTab.value.url,
                        goals: goalsArray
                    });
                    newTab.value = { label: '', url: '', goals: '' };
                    activeTabId.value = dynamicTabs.value.length - 1;
                    showAdmin.value = false;
                }
            };

            const removeTab = (idx) => {
                dynamicTabs.value.splice(idx, 1);
                if (activeTabId.value >= dynamicTabs.value.length) {
                    activeTabId.value = Math.max(0, dynamicTabs.value.length - 1);
                }
            };

            const formatUrl = (url) => {
                if (!url) return '';
                let u = url.trim();
                if (u.includes('youtube.com/watch?v=')) {
                    let id = u.split('v=')[1].split('&')[0];
                    return `https://www.youtube.com/embed/${id}`;
                }
                if (u.includes('youtu.be/')) {
                    let id = u.split('/').pop();
                    return `https://www.youtube.com/embed/${id}`;
                }
                return u;
            };

            return { 
                lessonTitle, activeTabId, showAdmin, showSchoolInfo, 
                dynamicTabs, newTab, currentTabGoals, addNewTab, 
                removeTab, formatUrl 
            };
        }
    }).mount('#app');
</script>
</body>
</html>
